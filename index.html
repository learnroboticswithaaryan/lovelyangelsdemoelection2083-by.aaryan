<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovely Angels English Boarding School Election</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏫 Lovely Angels English Boarding School</h1>
    <h2>Student Election Voting System</h2>

    <form id="voteForm">

        <div class="section">
            <h3>School Captain</h3>
            <label><input type="radio" name="captain"> ⭐ Star</label>
            <label><input type="radio" name="captain"> 🦅 Eagle</label>
        </div>

        <div class="section">
            <h3>School Vice Captain</h3>
            <label><input type="radio" name="vicecaptain"> 🚀 Rocket</label>
            <label><input type="radio" name="vicecaptain"> 📚 Book</label>
        </div>

        <div class="section">
            <h3>Child Club President</h3>
            <label><input type="radio" name="president"> 🏆 Trophy</label>
            <label><input type="radio" name="president"> 🌳 Tree</label>
            <label><input type="radio" name="president"> 🌞 Sun</label>
            <label><input type="radio" name="president"> 🔔 Bell</label>
        </div>

        <div class="section">
            <h3>Child Club Vice President</h3>
            <label><input type="radio" name="vicepresident"> 🎯 Target</label>
            <label><input type="radio" name="vicepresident"> 🕊️ Dove</label>
            <label><input type="radio" name="vicepresident"> ⚽ Football</label>
        </div>

        <div class="section">
            <h3>Secretary</h3>
            <label><input type="radio" name="secretary"> ✏️ Pencil</label>
            <label><input type="radio" name="secretary"> 🖥️ Computer</label>
            <label><input type="radio" name="secretary"> 📖 Open Book</label>
            <label><input type="radio" name="secretary"> 🎓 Graduation Cap</label>
        </div>

        <div class="section">
            <h3>Treasurer</h3>
            <label><input type="radio" name="treasurer"> 💰 Money Bag</label>
            <label><input type="radio" name="treasurer"> 🏦 Bank</label>
        </div>

        <div class="section">
            <h3>Members</h3>

            <label><input type="checkbox"> 🌹 Rose</label>
            <label><input type="checkbox"> 🍀 Clover</label>
            <label><input type="checkbox"> 🌈 Rainbow</label>
            <label><input type="checkbox"> 🦋 Butterfly</label>
            <label><input type="checkbox"> 🌙 Moon</label>
            <label><input type="checkbox"> ⚡ Lightning</label>
            <label><input type="checkbox"> 🎸 Guitar</label>
            <label><input type="checkbox"> 🏅 Medal</label>
            <label><input type="checkbox"> 🚲 Bicycle</label>
            <label><input type="checkbox"> 🧩 Puzzle</label>
            <label><input type="checkbox"> 🏀 Basketball</label>
            <label><input type="checkbox"> 🎨 Palette</label>

        </div>

        <button type="button" onclick="submitVote()">
            Submit Vote
        </button>

    </form>

</div>

<script src="script.js"></script>
</body>
</html>
